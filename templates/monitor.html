<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 TRADING MONITOR - Indicateurs + IA + Fondamentales</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #33ff33;
            font-family: 'VT323', 'Courier New', monospace;
            padding: 10px;
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            border: 2px solid #33ff33;
            padding: 12px;
            background: #0a0a0a;
        }
        .header {
            border-bottom: 2px solid #33ff33;
            padding-bottom: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 4px;
        }
        .title .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
        .title .ind-color { color: #ff6b00; }
        .title .ia-color { color: #00ccff; }
        .title .fund-color { color: #ffaa00; }

        .tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            border-bottom: 1px solid #33ff33;
            padding-bottom: 8px;
        }
        .tab {
            padding: 6px 16px;
            border: 1px solid #33ff33;
            background: transparent;
            color: #33ff33;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tab:hover { background: rgba(51,255,51,0.1); }
        .tab.active { background: rgba(51,255,51,0.15); border-color: #33ff33; }
        .tab .icon { margin-right: 4px; }
        .tab .badge-ind {
            background: #ff6b00;
            color: #000;
            font-size: 0.45rem;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 4px;
        }
        .tab .badge-ia {
            background: #00ccff;
            color: #000;
            font-size: 0.45rem;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 4px;
        }
        .tab .badge-fund {
            background: #ffaa00;
            color: #000;
            font-size: 0.45rem;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 4px;
        }

        .main-grid { display: grid; grid-template-columns: 2.5fr 1fr; gap: 12px; }
        .card { border: 1px solid #33ff33; padding: 10px; margin-bottom: 10px; background: rgba(51,255,51,0.02); }
        .card-title { font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #33ff33; padding-bottom: 4px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        .price-display { text-align: center; padding: 15px; border: 1px solid #33ff33; }
        .price { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 30px rgba(51,255,51,0.1); }
        .change-positive { color: #33ff33; }
        .change-negative { color: #ff3333; }
        #chart-container { height: 400px; border: 1px solid #33ff33; background: #0a0a0a; position: relative; }

        .chart-controls {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            padding: 4px;
            background: rgba(51,255,51,0.03);
            border: 1px solid #33ff33;
        }
        .chart-controls .group {
            display: flex;
            gap: 2px;
            align-items: center;
            padding: 0 6px;
            border-right: 1px solid rgba(51,255,51,0.3);
        }
        .chart-controls .group:last-child { border-right: none; }
        .chart-controls .group-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            opacity: 0.5;
            margin-right: 4px;
            white-space: nowrap;
        }
        .chart-controls button {
            background: transparent;
            border: 1px solid #33ff33;
            color: #33ff33;
            padding: 2px 8px;
            font-family: 'VT323', monospace;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .chart-controls button:hover { background: rgba(51,255,51,0.1); }
        .chart-controls button.active { background: rgba(51,255,51,0.2); }
        .chart-controls button.indicator-btn { border-color: #ff6b00; color: #ff6b00; }
        .chart-controls button.indicator-btn.active { background: rgba(255,107,0,0.2); }
        .chart-controls button.ia-btn { border-color: #00ccff; color: #00ccff; }
        .chart-controls button.ia-btn.active { background: rgba(0,204,255,0.2); }

        .input-group { display: flex; gap: 6px; margin: 6px 0; }
        .input-group input {
            flex: 1;
            background: transparent;
            border: 1px solid #33ff33;
            color: #33ff33;
            padding: 4px 8px;
            font-family: 'VT323', monospace;
            font-size: 0.9rem;
        }
        .input-group input:focus { outline: none; background: rgba(51,255,51,0.05); }
        .btn {
            background: transparent;
            border: 1px solid #33ff33;
            color: #33ff33;
            padding: 4px 12px;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(51,255,51,0.1); }
        .btn-sm { padding: 2px 8px; font-size: 0.65rem; }
        .btn-ind { border-color: #ff6b00; color: #ff6b00; }
        .btn-ia { border-color: #00ccff; color: #00ccff; }
        .btn-fund { border-color: #ffaa00; color: #ffaa00; }
        .btn-success { border-color: #33ff33; color: #33ff33; }
        .btn-danger { border-color: #ff3333; color: #ff3333; }
        .btn-warning { border-color: #ffaa00; color: #ffaa00; }
        .btn-export { border-color: #4CAF50; color: #4CAF50; }
        .btn-compare { border-color: #9C27B0; color: #9C27B0; }
        .btn-prefs { border-color: #FF9800; color: #FF9800; }
        .btn-alert { border-color: #ff1744; color: #ff1744; }
        .quick-buttons { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }

        .watchlist-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            border: 1px solid #33ff33;
            cursor: pointer;
            margin-bottom: 2px;
            background: rgba(51,255,51,0.02);
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .watchlist-item:hover { background: rgba(51,255,51,0.08); }
        .watchlist-item .icon { margin-right: 6px; }
        .watchlist-grid { max-height: 250px; overflow-y: auto; }
        .watchlist-grid::-webkit-scrollbar { width: 4px; }
        .watchlist-grid::-webkit-scrollbar-thumb { background: #33ff33; }

        .indicators-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .indicator-box {
            border: 1px solid #33ff33;
            padding: 6px 8px;
            text-align: center;
            background: rgba(51,255,51,0.02);
            border-radius: 4px;
        }
        .indicator-box .name {
            font-size: 0.5rem;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 1px;
        }
        .indicator-box .value {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 2px;
        }
        .indicator-box .sub-value {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .indicator-box .value.bullish { color: #33ff33; }
        .indicator-box .value.bearish { color: #ff3333; }
        .indicator-box .value.neutral { color: #ffaa00; }

        .signal-box {
            border: 1px solid #33ff33;
            padding: 4px 8px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px;
        }
        .signal-buy { border-color: #33ff33; background: rgba(51,255,51,0.05); }
        .signal-sell { border-color: #ff3333; background: rgba(255,51,51,0.05); }
        .signal-neutral { border-color: #ffaa00; background: rgba(255,170,0,0.05); }
        .signal-box .signal-icon { font-size: 1.2rem; }
        .signal-box .signal-content { flex: 1; }
        .signal-box .signal-content .signal-title { font-weight: bold; font-size: 0.8rem; }
        .signal-box .signal-content .signal-text { font-size: 0.7rem; opacity: 0.7; }

        .recommendation-box {
            border: 2px solid #33ff33;
            padding: 10px;
            text-align: center;
            margin-top: 8px;
            border-radius: 4px;
        }
        .recommendation-buy { border-color: #33ff33; background: rgba(51,255,51,0.05); }
        .recommendation-sell { border-color: #ff3333; background: rgba(255,51,51,0.05); }
        .recommendation-neutral { border-color: #ffaa00; background: rgba(255,170,0,0.05); }
        .recommendation-box .rec-title { font-size: 1.5rem; font-weight: bold; }
        .recommendation-box .rec-confidence { font-size: 0.8rem; opacity: 0.7; }

        .metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 8px; }
        .metric-card { border: 1px solid #33ff33; padding: 4px; text-align: center; background: rgba(51,255,51,0.02); border-radius: 4px; }
        .metric-card .label { font-size: 0.5rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .metric-card .value { font-size: 1rem; font-weight: bold; margin-top: 2px; }

        .prediction-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; margin-top: 6px; }
        .prediction-item { text-align: center; padding: 4px; border: 1px solid #33ff33; background: rgba(51,255,51,0.02); border-radius: 4px; }
        .prediction-item .day { font-size: 0.5rem; text-transform: uppercase; opacity: 0.6; }
        .prediction-item .price { font-weight: bold; font-size: 0.8rem; }
        .prediction-item .change-pred { font-size: 0.6rem; }

        .footer {
            border-top: 2px solid #33ff33;
            padding-top: 8px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.6;
        }
        .status-ok { color: #33ff33; }
        .status-err { color: #ff3333; }

        .price-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 6px;
        }
        .price-info span { display: flex; align-items: center; gap: 4px; }

        .badge {
            padding: 2px 8px;
            border: 1px solid #33ff33;
            font-size: 0.6rem;
            background: rgba(51,255,51,0.05);
            border-radius: 4px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .signal-count {
            font-size: 0.6rem;
            padding: 1px 8px;
            border-radius: 10px;
            background: rgba(51,255,51,0.1);
        }
        .signal-count.buy { background: rgba(51,255,51,0.2); color: #33ff33; }
        .signal-count.sell { background: rgba(255,51,51,0.2); color: #ff3333; }

        .ia-score-box {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .ia-score-bullish { background: rgba(51,255,51,0.2); color: #33ff33; }
        .ia-score-bearish { background: rgba(255,51,51,0.2); color: #ff3333; }
        .ia-score-neutral { background: rgba(255,170,0,0.2); color: #ffaa00; }

        /* Popup comparaison */
        .compare-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .compare-modal.active {
            display: flex;
        }
        .compare-modal-content {
            background: #0a0a0a;
            border: 2px solid #33ff33;
            padding: 20px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 8px;
        }
        .compare-modal-content .close-btn {
            float: right;
            background: none;
            border: none;
            color: #33ff33;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .compare-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .compare-card {
            border: 1px solid #33ff33;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
        }
        .compare-card .perf-positive { color: #33ff33; }
        .compare-card .perf-negative { color: #ff3333; }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0a0a0a;
            border: 2px solid #33ff33;
            padding: 15px 20px;
            border-radius: 8px;
            z-index: 2000;
            max-width: 350px;
            animation: slideIn 0.5s ease;
            box-shadow: 0 0 30px rgba(51,255,51,0.1);
        }
        .notification.buy { border-color: #33ff33; }
        .notification.sell { border-color: #ff3333; }
        .notification .notif-title { font-size: 1.2rem; font-weight: bold; }
        .notification .notif-text { font-size: 0.8rem; opacity: 0.7; }
        .notification .notif-close {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            color: #33ff33;
            cursor: pointer;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Couleurs fondamentales */
        .fund-positive { color: #33ff33; }
        .fund-negative { color: #ff3333; }
        .fund-neutral { color: #ffaa00; }

        .sector-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.5rem;
            background: rgba(51,255,51,0.1);
            border: 1px solid rgba(51,255,51,0.2);
        }

        @media (max-width: 1200px) { .main-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .title { font-size: 1.5rem; }
            .metrics-grid { grid-template-columns: repeat(2,1fr); }
            .indicators-grid { grid-template-columns: 1fr 1fr; }
            .price { font-size: 2rem; }
            .prediction-grid { grid-template-columns: repeat(3,1fr); }
            #chart-container { height: 300px; }
            .tabs .tab { font-size: 0.6rem; padding: 4px 8px; }
        }
        @media (max-width: 480px) {
            .price { font-size: 1.5rem; }
            #chart-container { height: 250px; }
            .chart-controls .group { border-right: none; flex-wrap: wrap; }
            .tabs .tab { font-size: 0.5rem; padding: 3px 6px; }
            .indicators-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="title">
                    📊 TRADING MONITOR <span class="ind-color">IND</span> + <span class="ia-color">IA</span> + <span class="fund-color">FUND</span> <span class="blink">▸</span>
                    <span style="font-size:0.7rem;opacity:0.4;letter-spacing:2px;display:block;margin-top:-4px;">
                        <i class="fas fa-chart-line"></i> TECHNIQUE • IA • FONDAMENTALES
                    </span>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-sm btn-alert" onclick="toggleAlerts()" id="alert-btn">
                    <i class="fas fa-bell"></i> <span id="alert-status">🔕</span>
                </button>
                <button class="btn btn-sm btn-prefs" onclick="savePrefs()">
                    <i class="fas fa-save"></i> Préfs
                </button>
                <button class="btn btn-sm btn-export" onclick="exportCSV()">
                    <i class="fas fa-file-csv"></i> CSV
                </button>
                <button class="btn btn-sm btn-compare" onclick="openCompare()">
                    <i class="fas fa-chart-bar"></i> Comparer
                </button>
                <span class="badge" style="border-color:#ff6b00;color:#ff6b00;">
                    <i class="fas fa-calculator"></i> IND
                </span>
                <span class="badge" style="border-color:#00ccff;color:#00ccff;">
                    <i class="fas fa-brain"></i> IA
                </span>
                <span class="badge" style="border-color:#ffaa00;color:#ffaa00;">
                    <i class="fas fa-building"></i> FUND
                </span>
                <span id="status" style="border:1px solid #33ff33;padding:4px 12px;">⏳ CHARGEMENT...</span>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs" id="tabs">
            <button class="tab active" data-tab="commodities"><span class="icon">🛢️</span>Commodités</button>
            <button class="tab" data-tab="crypto"><span class="icon">₿</span>Crypto</button>
            <button class="tab" data-tab="forex"><span class="icon">💱</span>Forex</button>
            <button class="tab" data-tab="usstocks"><span class="icon">🇺🇸</span>US Stocks</button>
            <button class="tab" data-tab="paris"><span class="icon">🇫🇷</span>Paris</button>
            <button class="tab" data-tab="water"><span class="icon">🌊</span>Eau</button>
            <button class="tab" data-tab="brics"><span class="icon">🌍</span>BRICS & EM</button>
            <button class="tab" data-tab="funds"><span class="icon">📊</span>FUNDS</button>
        </div>

        <!-- CONTENU DES TABS -->
        <div id="tab-contents">
            <div class="tab-content active" id="tab-commodities">
                <div class="main-grid" id="tab-grid-commodities"></div>
            </div>
            <div class="tab-content" id="tab-crypto">
                <div class="main-grid" id="tab-grid-crypto"></div>
            </div>
            <div class="tab-content" id="tab-forex">
                <div class="main-grid" id="tab-grid-forex"></div>
            </div>
            <div class="tab-content" id="tab-usstocks">
                <div class="main-grid" id="tab-grid-usstocks"></div>
            </div>
            <div class="tab-content" id="tab-paris">
                <div class="main-grid" id="tab-grid-paris"></div>
            </div>
            <div class="tab-content" id="tab-water">
                <div class="main-grid" id="tab-grid-water"></div>
            </div>
            <div class="tab-content" id="tab-brics">
                <div class="main-grid" id="tab-grid-brics"></div>
            </div>
            <div class="tab-content" id="tab-funds">
                <div class="main-grid" id="tab-grid-funds"></div>
            </div>
        </div>

        <div class="footer">
            📊 TRADING MONITOR v6.0 • 🔔 Alertes • 💾 Préférences • 📥 Export CSV • 📊 Comparaison • 📈 Fondamentales
        </div>
    </div>

    <!-- MODAL COMPARAISON -->
    <div class="compare-modal" id="compare-modal">
        <div class="compare-modal-content">
            <button class="close-btn" onclick="closeCompare()">✕</button>
            <h2 style="color:#33ff33;margin-bottom:10px;">📊 Comparaison d'actifs</h2>
            <div class="input-group" style="margin-bottom:10px;">
                <input type="text" id="compare-input" placeholder="GLD,BTC-USD,AAPL" value="GLD,BTC-USD,AAPL">
                <button class="btn" onclick="runCompare()"><i class="fas fa-play"></i></button>
            </div>
            <div id="compare-results">
                <div style="opacity:0.5;text-align:center;padding:20px;">Entrez les symboles séparés par des virgules</div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // CONFIGURATION
        // ================================================================
        var API_BASE = 'https://radio-gleaphe.duckdns.org/trading/api';
        var WS_URL = 'https://radio-gleaphe.duckdns.org/trading';
        var socket = io(WS_URL);
        var currentSymbol = 'GLD';

        var chartType = 'candle';
        var chart = null;

        var fundamentalData = {};

        var activeIndicators = {

        var categorySymbols = {

    'usstocks': ['AAPL', 'MSFT', 'GOOGL', 'NVDA', 'TSLA', 'AMZN', 'META', 'JPM'],
    'paris': ['ML.PA', 'SAN.PA', 'BNP.PA', 'OR.PA', 'AI.PA'],
    'water': ['PHO', 'FIW', 'CGW', 'AWK', 'XYL'],
    'brics': ['EEM', 'VWO', 'IEMG', 'FXI', 'EWZ', 'EZA', 'EPI', 'EWW', 'TUR', 'THD'],
    'funds': ['SPY', 'QQQ', 'VTI', 'VOO', 'IVV', 'DIA', 'IWM', 'BND', 'AGG', 'VGK', 'VPL', 'SCHD', 'JEPI', 'GDX', 'XLE', 'XLF', 'XLK', 'XLV', 'XLI', 'XLP', 'XLY'],
    'indices': ['^GSPC', '^DJI', '^IXIC', '^RUT', '^FTSE', '^GDAXI', '^N225', '^HSI', '^FCHI', '^STOXX50E']
};

var defaultSymbols = {
    'commodities': 'GLD',
    'crypto': 'BTC-USD',
    'forex': 'EURUSD=X',
    'usstocks': 'AAPL',
    'paris': 'ML.PA',
    'water': 'PHO',
    'brics': 'EEM',
    'funds': 'SPY',
    'indices': '^GSPC'
};

var categoryNames = {
    'commodities': 'Commodités',

        // ================================================================
        // CHARGEMENT DES PRÉFÉRENCES
        // ================================================================
        function loadPrefs() {
            try {
                var prefs = JSON.parse(localStorage.getItem('trading_monitor_prefs'));
                if (prefs) {
                    if (prefs.favorite_symbol) {
                        currentSymbol = prefs.favorite_symbol;
                        for (var cat in categorySymbols) {
                            if (categorySymbols[cat].indexOf(currentSymbol) !== -1) {
                                switchTab(cat);
                                break;
                            }
                        }
                    }
                    if (prefs.indicators) {
                        for (var key in prefs.indicators) {
                            if (activeIndicators.hasOwnProperty(key)) {
                                activeIndicators[key] = prefs.indicators[key];
                            }
                        }
                    }
                    if (prefs.alerts_enabled !== undefined) {
                        alertsEnabled = prefs.alerts_enabled;
                        updateAlertButton();
                    }
                }
            } catch(e) {}
        }

        function savePrefs() {
            try {
                var prefs = {
                    favorite_symbol: currentSymbol,
                    indicators: activeIndicators,
                    alerts_enabled: alertsEnabled,
                    saved_at: new Date().toISOString()
                };
                localStorage.setItem('trading_monitor_prefs', JSON.stringify(prefs));
                showNotification('💾 Préférences sauvegardées', '✅');
            } catch(e) {
                console.error('Erreur sauvegarde:', e);
            }
        }

        function updateAlertButton() {
            var btn = document.getElementById('alert-btn');
            var status = document.getElementById('alert-status');
            if (alertsEnabled) {
                btn.style.borderColor = '#33ff33';
                status.textContent = '🔔 ON';
                status.style.color = '#33ff33';
            } else {
                btn.style.borderColor = '#ff3333';
                status.textContent = '🔕 OFF';
                status.style.color = '#ff3333';
            }
        }

        function toggleAlerts() {
            alertsEnabled = !alertsEnabled;
            updateAlertButton();
            savePrefs();
            if (alertsEnabled) {
                showNotification('🔔 Alertes activées', '📢');
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            } else {
                showNotification('🔕 Alertes désactivées', '📢');
            }
        }

        // ================================================================
        // NOTIFICATIONS
        // ================================================================
        function showNotification(message, icon) {
            var container = document.getElementById('notif-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'notif-container';
                container.style.position = 'fixed';
                container.style.top = '20px';
                container.style.right = '20px';
                container.style.zIndex = '2000';
                document.body.appendChild(container);
            }
            var notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `
                <button class="notif-close" onclick="this.parentElement.remove()">✕</button>
                <div class="notif-title">${icon || '📢'} ${message}</div>
            `;
            container.appendChild(notif);
            setTimeout(function() {
                if (notif.parentElement) notif.remove();
            }, 5000);
        }

        function sendBrowserNotification(title, body, type) {
            if (!alertsEnabled) return;
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') {
                var notif = new Notification(title, {
                    body: body,
                    icon: type === 'buy' ? '🟢' : '🔴',
                    tag: 'trading_alert'
                });
                setTimeout(function() { notif.close(); }, 8000);
            } else if (Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        // ================================================================
        // EXPORT CSV
        // ================================================================
        function exportCSV() {
            var sym = currentSymbol;
            window.open(API_BASE + '/export-csv/' + encodeURIComponent(sym), '_blank');
            showNotification('📥 Export CSV lancé pour ' + sym, '📊');
        }

        // ================================================================
        // COMPARAISON
        // ================================================================
        function openCompare() {
            document.getElementById('compare-modal').classList.add('active');
        }

        function closeCompare() {
            document.getElementById('compare-modal').classList.remove('active');
        }

        function runCompare() {
            var input = document.getElementById('compare-input').value.trim();
            if (!input) return;
            var symbols = input.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
            if (symbols.length < 2) {
                document.getElementById('compare-results').innerHTML = '<div style="color:#ff3333;">❌ Au moins 2 symboles requis</div>';
                return;
            }
            document.getElementById('compare-results').innerHTML = '<div style="opacity:0.5;text-align:center;padding:20px;">⏳ Chargement...</div>';

            fetch(API_BASE + '/compare?symbols=' + encodeURIComponent(symbols.join(',')))
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('compare-results').innerHTML = '<div style="color:#ff3333;">❌ ' + data.error + '</div>';
                        return;
                    }
                    if (!data || data.length === 0) {
                        document.getElementById('compare-results').innerHTML = '<div style="opacity:0.5;text-align:center;padding:20px;">Aucune donnée</div>';
                        return;
                    }
                    var html = '<div class="compare-grid">';
                    data.forEach(function(item) {
                        var perfCls = item.performance >= 0 ? 'perf-positive' : 'perf-negative';
                        var perfSign = item.performance >= 0 ? '+' : '';
                        html += `
                            <div class="compare-card" style="border-color:${item.color || '#33ff33'};">
                                <div style="font-size:1.5rem;">${item.icon || '📈'}</div>
                                <div style="font-weight:bold;">${item.symbol}</div>
                                <div style="font-size:0.7rem;opacity:0.5;">${item.name || ''}</div>
                                <div style="font-size:1.1rem;margin:4px 0;">$${item.current_price.toFixed(2)}</div>
                                <div class="${perfCls}">${perfSign}${item.performance.toFixed(2)}%</div>
                                <div style="font-size:0.6rem;opacity:0.5;">Vol: ${item.volatility.toFixed(1)}%</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('compare-results').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('compare-results').innerHTML = '<div style="color:#ff3333;">❌ Erreur: ' + err.message + '</div>';
                });
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeCompare();
        });

        document.addEventListener('DOMContentLoaded', function() {

            for (var cat in categorySymbols) {
                var grid = document.getElementById('tab-grid-' + cat);
                if (grid) {
                    grid.innerHTML = generateTabContent(cat);
                }
            }
            initTabs();
            loadQuickButtons('commodities');

            setTimeout(function() {
                for (var key in activeIndicators) {
                    var btn = document.querySelector('[data-indicator="' + key + '"]');
                    if (btn) {
                        btn.classList.toggle('active', activeIndicators[key]);
                    }
                }
            }, 500);

            fetchDataForTab('commodities');

            socket.on('connect', function() {
                document.getElementById('status').textContent = '🟢 CONNECTÉ';
                document.getElementById('status').style.borderColor = '#33ff33';
                socket.emit('request_insights', { symbol: currentSymbol });
            });

            socket.on('disconnect', function() {
                document.getElementById('status').textContent = '🔴 DÉCONNECTÉ';
                document.getElementById('status').style.borderColor = '#ff3333';
            });

            socket.on('insights_update', function(data) {
                updateAIInsights(data);
                updateFundamentalData(data);
                if (alertsEnabled && data.is_strong_signal && data.symbol !== lastAlertSymbol) {
                    lastAlertSymbol = data.symbol;
                    var type = data.recommendation === 'ACHAT' ? 'buy' : 'sell';
                    var icon = type === 'buy' ? '🟢' : '🔴';
                    var title = type === 'buy' ? '🚀 SIGNAL ACHAT' : '📉 SIGNAL VENTE';
                    showNotification(title + ' ' + data.symbol + ' (Score: ' + data.score.toFixed(1) + ')', icon);
                    sendBrowserNotification(
                        title + ' ' + data.symbol,
                        'Score: ' + data.score.toFixed(1) + ' | Confiance: ' + data.confidence.toFixed(0) + '%',
                        type
                    );
                }
            });

            setInterval(function() { fetchDataForTab(currentTab); }, 60000);
            setInterval(function() { refreshWatchlist(currentTab); }, 120000);
            setInterval(function() { refreshTopPerformers(currentTab); }, 120000);
        });

        // ================================================================

        function initTabs() {
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    var tabId = this.dataset.tab;
                    switchTab(tabId);
                });
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab').forEach(function(t) {
                t.classList.toggle('active', t.dataset.tab === tabId);
            });
            document.querySelectorAll('.tab-content').forEach(function(c) {
                c.classList.toggle('active', c.id === 'tab-' + tabId);
            });

            loadQuickButtons(tabId);
            var defaultSym = defaultSymbols[tabId] || 'GLD';
            var input = document.getElementById('symbol-input-' + tabId);
            if (input) input.value = defaultSym;
            fetchDataForTab(tabId);
        }

                else if (sym === 'VOO') label = '📊 S&P Vanguard';
                else if (sym === 'IVV') label = '📊 S&P iShares';
                else if (sym === 'BND') label = '🔵 Bonds';
                else if (sym === 'AGG') label = '🔵 Aggregate';
                else if (sym === 'VGK') label = '🇪🇺 Europe';

        // ================================================================
        // FETCH DATA PAR TAB
        // ================================================================
        function fetchDataForTab(category) {
            var input = document.getElementById('symbol-input-' + category);
            if (!input) return;
            var sym = input.value.trim() || defaultSymbols[category] || 'GLD';
            currentSymbol = sym;

            var statusEl = document.getElementById('status');
            statusEl.textContent = '⏳ CHARGEMENT...';
            statusEl.style.borderColor = '#33ff33';

            fetch(API_BASE + '/trading/' + encodeURIComponent(sym))
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(data => {
                    if (data.error) {
                        statusEl.textContent = '❌ ' + data.error;
                        statusEl.style.borderColor = '#ff3333';
                        return;
                    }
                    statusEl.textContent = '🟢 CONNECTÉ';
                    statusEl.style.borderColor = '#33ff33';
                    updateDisplay(data, category);
                    updateChart(data, category);
                    updateIndicators(data, category);
                    document.getElementById('last-update-' + category).textContent = new Date().toLocaleTimeString('fr-FR');

                    if (socket.connected) {
                        socket.emit('request_insights', { symbol: sym });
                    }
                    try {
                        var prefs = JSON.parse(localStorage.getItem('trading_monitor_prefs') || '{}');
                        prefs.favorite_symbol = sym;
                        localStorage.setItem('trading_monitor_prefs', JSON.stringify(prefs));
                    } catch(e) {}
                })
                .catch(err => {
                    statusEl.textContent = '❌ ERREUR: ' + err.message;
                    statusEl.style.borderColor = '#ff3333';
                    console.error(err);
                });
        }

        function fetchData() {
            fetchDataForTab(currentTab);
        }

        // ================================================================
        // UPDATE DISPLAY
        // ================================================================
        function updateDisplay(data, category) {
            var pd = data.data[currentPeriod] || data.data['1d'] || data.data['1mo'];
            if (!pd) return;
            var st = pd.stats;

            var prefix = '-' + category;
            document.getElementById('current-symbol' + prefix).textContent = data.symbol;
            document.getElementById('current-exchange' + prefix).textContent = data.exchange || 'Market';
            document.getElementById('current-category' + prefix).textContent = data.category || 'Autre';
            document.getElementById('current-price' + prefix).textContent = '$' + st.current_price.toFixed(2);

            var cls = st.change >= 0 ? 'change-positive' : 'change-negative';
            var sign = st.change >= 0 ? '+' : '';
            document.getElementById('current-change' + prefix).innerHTML =
                '<span class="' + cls + '">' + sign + st.change_percent.toFixed(2) + '% (' + sign + st.change.toFixed(2) + ')</span>';

            document.getElementById('day-high' + prefix).textContent = '$' + st.high.toFixed(2);
            document.getElementById('day-low' + prefix).textContent = '$' + st.low.toFixed(2);

            var vol = st.volume;
            if (vol > 1000000) vol = (vol/1000000).toFixed(1) + 'M';
            else if (vol > 1000) vol = (vol/1000).toFixed(1) + 'K';
            document.getElementById('volume' + prefix).textContent = vol;
        }

            document.getElementById('ind-sma200' + prefix).textContent = ind.last_sma_200 !== null && ind.last_sma_200 !== undefined ? '$' + ind.last_sma_200.toFixed(2) : '--';
            document.getElementById('ind-bb-upper' + prefix).textContent = ind.last_bb_upper !== null && ind.last_bb_upper !== undefined ? '$' + ind.last_bb_upper.toFixed(2) : '--';
            document.getElementById('ind-bb-lower' + prefix).textContent = ind.last_bb_lower !== null && ind.last_bb_lower !== undefined ? '$' + ind.last_bb_lower.toFixed(2) : '--';
            document.getElementById('ind-stoch-k' + prefix).textContent = ind.last_stoch_k !== null && ind.last_stoch_k !== undefined ? ind.last_stoch_k.toFixed(1) : '--';
            document.getElementById('ind-stoch-d' + prefix).textContent = ind.last_stoch_d !== null && ind.last_stoch_d !== undefined ? ind.last_stoch_d.toFixed(1) : '--';

        // ================================================================
        // UPDATE DONNÉES FONDAMENTALES
        // ================================================================

                if (data.symbol && categorySymbols[cat].indexOf(data.symbol) !== -1) {
                    category = cat;
                    break;
                }
            }
            if (!category) category = currentTab;

            var prefix = '-' + category;
            var fund = data.fundamental;

            document.getElementById('fund-sector' + prefix).textContent = fund.sector || 'N/A';
            document.getElementById('fund-industry' + prefix).textContent = fund.industry || 'N/A';

            var pe = fund.pe_ratio;
            var peEl = document.getElementById('fund-pe' + prefix);
            if (peEl) {
                peEl.textContent = pe !== 'N/A' && pe !== null ? pe.toFixed(2) : 'N/A';
                peEl.className = 'value ' + (pe < 15 ? 'bullish' : pe > 30 ? 'bearish' : 'neutral');
            }

            var div = fund.dividend_yield;
            var divEl = document.getElementById('fund-dividend' + prefix);
            if (divEl) {
                divEl.textContent = div !== 'N/A' && div !== null ? (div * 100).toFixed(2) + '%' : 'N/A';
                divEl.className = 'value ' + (div > 0.03 ? 'bullish' : div > 0 ? 'neutral' : 'neutral');

            var mcap = fund.market_cap;
            var mcapEl = document.getElementById('fund-mcap' + prefix);
            if (mcapEl) {
                if (mcap !== 'N/A' && mcap !== null && mcap > 0) {
                    if (mcap >= 1e12) mcapEl.textContent = (mcap / 1e12).toFixed(2) + ' T$';
                    else if (mcap >= 1e9) mcapEl.textContent = (mcap / 1e9).toFixed(2) + ' Md$';
                    else if (mcap >= 1e6) mcapEl.textContent = (mcap / 1e6).toFixed(2) + ' M$';
                    else mcapEl.textContent = mcap.toFixed(0) + '$';
                } else {
                    mcapEl.textContent = 'N/A';
                }
                mcapEl.className = 'value neutral';
            }

            var beta = fund.beta;
            var betaEl = document.getElementById('fund-beta' + prefix);
            if (betaEl) {
                betaEl.textContent = beta !== 'N/A' && beta !== null ? beta.toFixed(2) : 'N/A';
                betaEl.className = 'value ' + (beta > 1.5 ? 'bearish' : beta < 0.8 ? 'bullish' : 'neutral');
            }

            var eps = fund.eps;
            var epsEl = document.getElementById('fund-eps' + prefix);
            if (epsEl) {
                epsEl.textContent = eps !== 'N/A' && eps !== null ? eps.toFixed(2) : 'N/A';
                epsEl.className = 'value ' + (eps > 0 ? 'bullish' : 'bearish');
            }

            var margin = fund.profit_margin;
            var marginEl = document.getElementById('fund-margin' + prefix);
            if (marginEl) {
                marginEl.textContent = margin !== 'N/A' && margin !== null ? (margin * 100).toFixed(1) + '%' : 'N/A';
                marginEl.className = 'value ' + (margin > 0.15 ? 'bullish' : margin > 0 ? 'neutral' : 'bearish');
            }

            var roe = fund.return_on_equity;
            var roeEl = document.getElementById('fund-roe' + prefix);
            if (roeEl) {
                roeEl.textContent = roe !== 'N/A' && roe !== null ? (roe * 100).toFixed(1) + '%' : 'N/A';
                roeEl.className = 'value ' + (roe > 0.15 ? 'bullish' : roe > 0 ? 'neutral' : 'bearish');
            }

            var debt = fund.debt_to_equity;
            var debtEl = document.getElementById('fund-debt' + prefix);
            if (debtEl) {
                debtEl.textContent = debt !== 'N/A' && debt !== null ? debt.toFixed(2) : 'N/A';
                debtEl.className = 'value ' + (debt < 0.5 ? 'bullish' : debt < 1.5 ? 'neutral' : 'bearish');
            }

            var high52El = document.getElementById('fund-high52' + prefix);

                high52El.className = 'value neutral';
            }

            var low52El = document.getElementById('fund-low52' + prefix);
            if (low52El) {
                low52El.textContent = low52 !== 'N/A' && low52 !== null ? '$' + low52.toFixed(2) : 'N/A';

        // ================================================================
        // UPDATE IA INSIGHTS
        // ================================================================
        function updateAIInsights(data) {
            if (!data || data.error) return;

            var category = null;
            for (var cat in categorySymbols) {
                if (data.symbol && categorySymbols[cat].indexOf(data.symbol) !== -1) {
                    category = cat;
                    break;
                }
            }
            if (!category) category = currentTab;

            var prefix = '-' + category;

            var scoreEl = document.getElementById('ia-score' + prefix);
            if (scoreEl) {
                var score = data.score || 0;
                var color = score > 20 ? '#33ff33' : score < -20 ? '#ff3333' : '#ffaa00';
                scoreEl.textContent = score.toFixed(1);
                scoreEl.style.color = color;
            }

            var recoEl = document.getElementById('ia-reco' + prefix);
            if (recoEl) {
                var rec = data.recommendation || 'NEUTRE';
                var color = rec === 'ACHAT' ? '#33ff33' : rec === 'VENTE' ? '#ff3333' : '#ffaa00';
                recoEl.textContent = rec;
                recoEl.style.color = color;
            }

            var confEl = document.getElementById('ia-conf' + prefix);
            if (confEl) {
                confEl.textContent = (data.confidence || 50).toFixed(0) + '%';
            }

            var signals = data.signals || [];
            var signalsContainer = document.getElementById('signals-container' + prefix);
            if (signalsContainer) {
                if (signals.length === 0) {
                    signalsContainer.innerHTML = '<div class="signal-box signal-neutral"><span class="signal-icon">🟡</span><div class="signal-content"><div class="signal-title">NEUTRE</div><div class="signal-text">Aucun signal détecté</div></div></div>';
                } else {
                    var html = '';
                    signals.forEach(function(s) {
                        var cls = s.type === 'buy' ? 'signal-buy' : s.type === 'sell' ? 'signal-sell' : 'signal-neutral';
                        var icon = s.type === 'buy' ? '🟢' : s.type === 'sell' ? '🔴' : '🟡';
                        html += '<div class="signal-box ' + cls + '">';
                        html += '<span class="signal-icon">' + icon + '</span>';
                        html += '<div class="signal-content">';
                        html += '<div class="signal-title">' + s.type.toUpperCase() + ' - ' + s.indicator + '</div>';
                        html += '<div class="signal-text">' + s.message + ' (' + s.value + ')</div>';
                        html += '</div></div>';
                    });
                    signalsContainer.innerHTML = html;
                }
            }

            var signalCount = document.getElementById('signal-count' + prefix);
            if (signalCount) {
                var buyCount = data.buy_signals || 0;
                var sellCount = data.sell_signals || 0;
                signalCount.innerHTML = '<span class="signal-count buy">🟢 ' + buyCount + '</span> <span class="signal-count sell">🔴 ' + sellCount + '</span>';
            }

            var recoContainer = document.getElementById('recommendation-container' + prefix);
            if (recoContainer) {
                var rec = data.recommendation || 'NEUTRE';
                var conf = data.confidence || 50;
                var sl = data.stop_loss || 0;
                var tp = data.take_profit || 0;

                var recClass = rec === 'ACHAT' ? 'recommendation-buy' : rec === 'VENTE' ? 'recommendation-sell' : 'recommendation-neutral';
                var color = rec === 'ACHAT' ? '#33ff33' : rec === 'VENTE' ? '#ff3333' : '#ffaa00';

                recoContainer.innerHTML =
                    '<div class="recommendation-box ' + recClass + '">' +
                        '<div class="rec-title" style="color:' + color + ';">' + rec + '</div>' +
                        '<div class="rec-confidence">CONFIANCE: ' + conf + '%</div>' +
                        '<div style="margin-top:6px;display:flex;gap:12px;justify-content:center;font-size:0.8rem;">' +
                            '<span style="color:#ff3333;">STOP-LOSS: $' + sl.toFixed(2) + '</span>' +
                            '<span style="color:#33ff33;">TAKE-PROFIT: $' + tp.toFixed(2) + '</span>' +
                        '</div>' +
                    '</div>';
            }

            var preds = data.predictions || [];
            var cp = data.current_price || 0;
            for (var i = 0; i < 5; i++) {
                var el = document.getElementById('pred-' + (i + 1) + prefix);
                var ce = document.getElementById('pred-change-' + (i + 1) + prefix);
                if (el && i < preds.length) {
                    var p = preds[i];
                    var ch = ((p - cp) / cp * 100);
                    var cc = ch > 0 ? '#33ff33' : ch < 0 ? '#ff3333' : '#ffaa00';
                    el.textContent = '$' + p.toFixed(2);
                    el.style.color = cc;
                    if (ce) {
                        ce.textContent = (ch >= 0 ? '+' : '') + ch.toFixed(1) + '%';
                        ce.style.color = cc;
                    }
                }
            }
        }

        // ================================================================
        // CHART
        // ================================================================
        function updateChart(data, category) {
            var pd = data.data[currentPeriod] || data.data['1d'] || data.data['1mo'];
            if (!pd) return;

            candlesData = pd.candles || [];
            if (candlesData.length === 0) return;

            var containerId = 'chart-container-' + category;
            var container = document.getElementById(containerId);
            if (!container) return;

            container.innerHTML = '';

            if (typeof LightweightCharts === 'undefined') {
                container.innerHTML = '<div style="color:#ff3333;text-align:center;padding:20px;">❌ Librairie non chargée</div>';
                return;
            }

            var chartInstance = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 400,
                layout: {
                    background: { color: '#0a0a0a' },
                    textColor: '#33ff33',
                    fontFamily: "'VT323', monospace"
                },
                grid: {
                    vertLines: { color: '#1a1a1a' },
                    horzLines: { color: '#1a1a1a' }
                },
                timeScale: {
                    borderColor: '#33ff33',
                    timeVisible: true,
                    secondsVisible: false,
                },
                rightPriceScale: {
                    borderColor: '#33ff33',
                    scaleMargins: { top: 0.05, bottom: activeIndicators.volume ? 0.25 : 0.05 }
                }
            });

            var chartData = candlesData.map(function(c) {
                return { time: c.time, open: c.open, high: c.high, low: c.low, close: c.close };
            });

            if (chartType === 'candle') {
                var series = chartInstance.addCandlestickSeries({
                    upColor: '#33ff33',
                    downColor: '#ff3333',
                    borderUpColor: '#33ff33',
                    borderDownColor: '#ff3333',
                    wickUpColor: '#33ff33',
                    wickDownColor: '#ff3333',
                    priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                });
                series.setData(chartData);
            } else {
                var series = chartInstance.addLineSeries({
                    color: '#33ff33',
                    lineWidth: 2,
                    priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                });
                series.setData(chartData.map(function(c) { return { time: c.time, value: c.close }; }));
            }

            var ind = pd.indicators || {};

            if (activeIndicators.sma && ind.sma_20) {
                var sma20Data = buildLineData(candlesData, ind.sma_20);
                if (sma20Data.length > 0) {
                    var sma20Series = chartInstance.addLineSeries({
                        color: '#2196F3',
                        lineWidth: 1,
                        priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                    });
                    sma20Series.setData(sma20Data);
                }
                if (ind.sma_50) {
                    var sma50Data = buildLineData(candlesData, ind.sma_50);
                    if (sma50Data.length > 0) {
                        var sma50Series = chartInstance.addLineSeries({
                            color: '#FF9800',
                            lineWidth: 1,
                            priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                        });
                        sma50Series.setData(sma50Data);
                    }
                }
                if (ind.sma_200) {
                    var sma200Data = buildLineData(candlesData, ind.sma_200);
                    if (sma200Data.length > 0) {
                        var sma200Series = chartInstance.addLineSeries({
                            color: '#9C27B0',
                            lineWidth: 1,
                            priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                        });
                        sma200Series.setData(sma200Data);
                    }
                }
            }

            if (activeIndicators.ema && ind.ema_12) {
                var ema12Data = buildLineData(candlesData, ind.ema_12);
                if (ema12Data.length > 0) {
                    var ema12Series = chartInstance.addLineSeries({
                        color: '#00ccff',
                        lineWidth: 1,
                        priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                    });
                    ema12Series.setData(ema12Data);
                }
                if (ind.ema_26) {
                    var ema26Data = buildLineData(candlesData, ind.ema_26);
                    if (ema26Data.length > 0) {
                        var ema26Series = chartInstance.addLineSeries({
                            color: '#ff6b00',
                            lineWidth: 1,
                            priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                        });
                        ema26Series.setData(ema26Data);
                    }
                }
            }

            if (activeIndicators.bb && ind.bb_upper) {
                var bbUpperData = buildLineData(candlesData, ind.bb_upper);
                var bbLowerData = buildLineData(candlesData, ind.bb_lower);
                if (bbUpperData.length > 0) {
                    var bbUpperSeries = chartInstance.addLineSeries({
                        color: '#4CAF50',
                        lineWidth: 1,
                        lineStyle: 2,
                        priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                    });
                    bbUpperSeries.setData(bbUpperData);
                }
                if (bbLowerData.length > 0) {
                    var bbLowerSeries = chartInstance.addLineSeries({
                        color: '#4CAF50',
                        lineWidth: 1,
                        lineStyle: 2,
                        priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                    });
                    bbLowerSeries.setData(bbLowerData);
                }
            }

            if (activeIndicators.volume) {
                var volSeries = chartInstance.addHistogramSeries({
                    color: '#4488ff',
                    priceFormat: { type: 'volume' },
                    priceScaleId: 'volume',
                    scaleMargins: { top: 0.80, bottom: 0 },
                });
                volSeries.setData(candlesData.map(function(c) {
                    return {
                        time: c.time,
                        value: c.volume,
                        color: c.close >= c.open ? 'rgba(51,255,51,0.3)' : 'rgba(255,51,51,0.3)'
                    };
                }));
            }

            chartInstance.timeScale().fitContent();
            window['chart_' + category] = chartInstance;
            chart = chartInstance;
        }

        function buildLineData(candles, data) {
            var result = [];
            for (var i = 0; i < candles.length && i < data.length; i++) {
                if (data[i] !== null && data[i] !== undefined && !isNaN(data[i])) {
                    result.push({ time: candles[i].time, value: data[i] });
                }
            }
            return result;
        }

        // ================================================================
        // CONTROLES
        // ================================================================
        function changePeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('[data-period]').forEach(function(b) {
                b.classList.toggle('active', b.dataset.period === period);
            });
            fetchDataForTab(currentTab);
        }

        function changeChartType(type) {
            chartType = type;
            document.querySelectorAll('[data-type]').forEach(function(b) {
                b.classList.toggle('active', b.dataset.type === type);
            });
            if (candlesData.length > 0) {
                var data = { data: {} };
                data.data[currentPeriod] = { candles: candlesData };
                updateChart(data, currentTab);
            }
        }

        function toggleIndicator(indicator) {
            activeIndicators[indicator] = !activeIndicators[indicator];
            var btn = document.querySelector('[data-indicator="' + indicator + '"]');
            if (btn) btn.classList.toggle('active');
            savePrefs();
            fetchDataForTab(currentTab);
        }

        function quickSelect(symbol) {
            var foundCat = null;
            for (var cat in categorySymbols) {
                if (categorySymbols[cat].indexOf(symbol) !== -1) {
                    foundCat = cat;
                    break;
                }
            }
            if (!foundCat) foundCat = 'commodities';
            if (currentTab !== foundCat) switchTab(foundCat);
            var input = document.getElementById('symbol-input-' + foundCat);
            if (input) {
                input.value = symbol;
                fetchDataForTab(foundCat);
            }
        }

        // ================================================================
        // WATCHLIST & TOP PERFORMERS
        // ================================================================
        function refreshWatchlist(category) {
            var container = document.getElementById('watchlist-' + category);
            if (!container) return;
            container.innerHTML = 'CHARGEMENT...';

            fetch(API_BASE + '/watchlist')
                .then(r => r.json())
                .then(data => {
                    if (!data || data.error) {
                        container.innerHTML = '❌ INDISPONIBLE';
                        return;
                    }
                    var catName = categoryNames[category] || category;
                    var filtered = data.filter(function(item) {
                        return item.category === catName;
                    });
                    if (filtered.length === 0) filtered = data.slice(0, 15);

                    var html = '';
                    filtered.forEach(function(item) {
                        if (item.error) return;
                        var cls = item.changePercent >= 0 ? 'change-positive' : 'change-negative';
                        var sign = item.changePercent >= 0 ? '+' : '';
                        html += '<div class="watchlist-item" onclick="quickSelect(\'' + item.symbol + '\')">';
                        html += '<span><span class="icon">' + (item.icon || '📈') + '</span> ' + item.symbol + ' <span style="font-size:0.5rem;opacity:0.5;">' + (item.sector || '') + '</span></span>';
                        html += '<span>$' + item.price.toFixed(2) + ' <span class="' + cls + '">' + sign + item.changePercent.toFixed(2) + '%</span></span>';
                        html += '</div>';
                    });
                    container.innerHTML = html;
                })
                .catch(err => {
                    container.innerHTML = '❌ ERREUR';
                    console.error(err);
                });
        }

        function refreshTopPerformers(category) {
            var container = document.getElementById('top-performers-' + category);
            if (!container) return;
            container.innerHTML = 'CHARGEMENT...';

            fetch(API_BASE + '/top-performers')
                .then(r => r.json())
                .then(data => {
                    if (!data || data.error) {
                        container.innerHTML = '❌ INDISPONIBLE';
                        return;
                    }
                    var html = '';
                    data.forEach(function(item, idx) {
                        var cls = item.changePercent >= 0 ? 'change-positive' : 'change-negative';
                        var sign = item.changePercent >= 0 ? '+' : '';
                        var star = idx === 0 ? '🏆 ' : '';
                        html += '<div class="watchlist-item" onclick="quickSelect(\'' + item.symbol + '\')">';
                        html += '<span>' + star + '<span class="icon">' + (item.icon || '📈') + '</span> ' + item.symbol + ' <span style="font-size:0.5rem;opacity:0.5;">' + (item.sector || '') + '</span></span>';
                        html += '<span>$' + item.price.toFixed(2) + ' <span class="' + cls + '">' + sign + item.changePercent.toFixed(2) + '%</span></span>';
                        html += '</div>';
                    });
                    container.innerHTML = html;
                })
                .catch(err => {
                    container.innerHTML = '❌ ERREUR';
                    console.error(err);
                });
        }

        // ================================================================
        // RESIZE
        // ================================================================
        window.addEventListener('resize', function() {
            for (var cat in categorySymbols) {
                var container = document.getElementById('chart-container-' + cat);
                if (container && window['chart_' + cat]) {
                    try {
                        window['chart_' + cat].resize(container.clientWidth, 400);
                    } catch(e) {}
                }
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var activeInput = document.activeElement;
                if (activeInput && activeInput.id && activeInput.id.startsWith('symbol-input-')) {
                    var cat = activeInput.id.replace('symbol-input-', '');
                    fetchDataForTab(cat);
                }
                if (activeInput && activeInput.id === 'compare-input') {
                    runCompare();
                }
            }
        });
    </script>
</body>
</html>
